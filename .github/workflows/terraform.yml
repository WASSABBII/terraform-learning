name:  Terraform CI

on:
  push:
    branches:
      - main
    
jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Chekout code
        uses: actions/checkout@v3
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        
      - name: Terraform init
        run: terraform init 
      
      - name: Terraform Format
        run: terraform fmt -check
      
      - name: Terraform Validate
        run: terraform validate 
      
      - name: Terraform Plan
        run: terraform plan

